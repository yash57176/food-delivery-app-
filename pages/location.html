<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Location - Zesto</title>
  
  <!-- Google Fonts: Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="location.css">
</head>
<body>

  <main class="location-wrapper">
    <div class="location-card">
      
      <!-- Illustration / Icon -->
      <div class="icon-container">
        <div class="pulse-ring"></div>
        <div class="icon-bg">
          <span class="material-symbols-outlined map-icon">location_on</span>
        </div>
      </div>

      <!-- Text Content -->
      <div class="text-content">
        <h1>What's your location?</h1>
        <p>We need your location to show available groceries and delivery options in your area.</p>
      </div>

      <!-- Permission Status Alert (Hidden by default) -->
      <div id="permissionStatus" class="permission-status hidden">
        <span class="material-symbols-outlined status-icon">info</span>
        <span class="status-text">Please allow location access in your browser settings.</span>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <button id="btnCurrentLocation" class="btn-primary">
          <span class="material-symbols-outlined btn-icon">my_location</span>
          <span class="btn-text">Use Current Location</span>
          <div class="spinner hidden"></div>
        </button>

        <button id="btnManualLocation" class="btn-secondary">
          <span class="material-symbols-outlined btn-icon">map</span>
          <span>Select Manually</span>
        </button>
      </div>

      <!-- Skip Option -->
      <div class="skip-container">
        <button id="btnSkip" class="btn-text-only">Skip for now</button>
      </div>

    </div>
  </main>

  <script src="location.js"></script>
</body>
</html>
