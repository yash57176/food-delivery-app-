<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zesto - Fresh Grocery Delivered Fast</title>
  
  <!-- Google Fonts: Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="../styles/splash.css">
</head>
<body>

  <main class="splash-container">
    <!-- Main Content Box -->
    <div class="content">
      <!-- Logo Container -->
      <div class="logo-wrapper">
        <div class="glow-effect"></div>
        <div class="logo-box">
          <span class="material-symbols-outlined logo-icon">shopping_basket</span>
        </div>
      </div>

      <!-- App Branding -->
      <h1 class="app-name">Zesto</h1>
      <p class="tagline">Fresh Grocery Delivered Fast</p>
    </div>

    <!-- Premium Loading Indicator -->
    <div class="loader-container">
      <div class="spinner"></div>
    </div>
  </main>

  <!-- Script -->
  <script src="../scripts/splash.js"></script>
</body>
</html>
